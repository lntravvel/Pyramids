<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PYRAMID | Global Travel Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;600;800&family=Inter:wght@300;400;600;800&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              cairo: ['Cairo', 'sans-serif'],
              chinese: ['"Noto Sans SC"', 'sans-serif'],
            },
            colors: {
              gold: {
                400: '#FACC15',
                500: '#EAB308',
                600: '#CA8A04',
                glow: '#FFD700',
              },
              midnight: '#020617',
              deep: '#0F172A',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              'pulse-glow': {
                '0%, 100%': { opacity: '1', boxShadow: '0 0 20px rgba(234, 179, 8, 0.5)' },
                '50%': { opacity: '0.5', boxShadow: '0 0 10px rgba(234, 179, 8, 0.2)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #020617; 
      }
      ::-webkit-scrollbar-thumb {
        background: #CA8A04; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #EAB308; 
      }
      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .perspective-1000 {
        perspective: 1000px;
      }

      /* POWERFUL HOLOGRAPHIC SHEEN ANIMATION */
      @keyframes sheen-sweep {
        0% {
          transform: translateX(-150%) skewX(-25deg);
        }
        100% {
          transform: translateX(200%) skewX(-25deg);
        }
      }

      /* This class creates the rainbow metallic effect */
      .holographic-sheen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent 20%,
          rgba(255, 255, 255, 0.3) 30%,
          rgba(0, 255, 255, 0.4) 40%, /* Cyan */
          rgba(255, 0, 255, 0.4) 50%, /* Magenta */
          rgba(255, 255, 0, 0.4) 60%, /* Yellow */
          rgba(255, 255, 255, 0.3) 70%,
          transparent 80%
        );
        mix-blend-mode: overlay;
        opacity: 0.8;
        pointer-events: none; /* Crucial: lets clicks pass through */
        transform: translateX(-150%) skewX(-25deg);
      }

      .group:hover .holographic-sheen {
        animation: sheen-sweep 0.7s ease-in-out forwards;
      }

      /* EQUALIZER ANIMATION */
      @keyframes equalize {
        0% { height: 3px; }
        50% { height: 15px; }
        100% { height: 3px; }
      }
      .equalizer-bar {
        animation: equalize 1s infinite ease-in-out;
      }
      .equalizer-bar:nth-child(2) { animation-delay: 0.1s; animation-duration: 0.8s; }
      .equalizer-bar:nth-child(3) { animation-delay: 0.2s; animation-duration: 1.2s; }
      .equalizer-bar:nth-child(4) { animation-delay: 0.3s; animation-duration: 0.9s; }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>

</head>

</html>
